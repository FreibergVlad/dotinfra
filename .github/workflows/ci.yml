name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tf-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.11.6

      - run: make tf-fmt-check
      - run: make tf-init
      - run: make tf-validate
